# 1. API Deployment (Producer)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
      - name: api
        image: sentinel-match:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
---
# 2. Worker Deployment (Consumer/Inference)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-worker
  template:
    metadata:
      labels:
        app: inference-worker
    spec:
      containers:
      - name: worker
        image: sentinel-match:latest
        # Override entrypoint to start worker logic
        command: ["python", "worker_entrypoint.py"]
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "4Gi"
---
# 3. Redis Broker (Required for Queueing)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379